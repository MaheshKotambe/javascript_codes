<html>
    <head>
        <style>
            *{
                margin:0;
                padding:0
            }
            #ele{
                width:200px;
                height:200px;
                background-color:red;
            }
            button{
                padding: 10px 15px;
                margin:100px;
                border: 2px dotted red;
                border-radius:20px
            }
            .abc{
                height:200px;
                width:200px;
                border:10px solid black;
                background: powderblue;
                /* margin:50px; */
            }
            #one{
                box-sizing:border-box;
                margin-bottom:50px;
            }
            #two{
                box-sizing:content-box;
                margin-top:60px;
            }

        </style>
    </head>
    <body>
        <div id='ele'></div>
         <button>click here</button>
        <div id='one' class='abc'>one</div>
        <div id='two'class='abc'>two</div>

    </body>
</html>
