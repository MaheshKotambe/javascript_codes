<!DOCTYPE html>
<html lang="en">
<head>
    <title>functions</title>
    <script>
        function changePara(){
            document.getElementById("para").innerHTML="changed paragraph"
        }
    </script>
</head>
<body>
    <p id="para">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Quidem, cumque.
    </p>
    <button onclick="changePara()">
        click me
    </button>
</body>
</html>
